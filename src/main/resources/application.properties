spring.application.name=auth-api

# Postgre SQL - Connection
spring.datasource.url=${POSTGRE_SQL_URI}
spring.datasource.username=${POSTGRE_SQL_USER}
spring.datasource.password=${POSTGRE_SQL_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS
app.security.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# Server Configuration - Production
server.port=${SERVER_PORT_BACK:8080}

# Security Configuration - Production
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Alexa OAuth2 Authorization Code
alexa.oauth.client-id=${ALEXA_OAUTH_CLIENT_ID:alexa-skill-client}
alexa.oauth.client-secret=${ALEXA_OAUTH_CLIENT_SECRET:change-me}
alexa.oauth.access-token-expiration-seconds=${ALEXA_OAUTH_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}
alexa.oauth.code-ttl-seconds=${ALEXA_OAUTH_CODE_TTL_SECONDS:300}